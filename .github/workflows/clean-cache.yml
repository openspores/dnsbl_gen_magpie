name: Clear Magpie Cache

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  clear-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Clear Magpie cache and stats
        run: |
          echo "🧹 Clearing Magpie cache..."
          rm -rf ./data
          rm -f ./data/stats.json
          rm -f ./data/cache.db  # If exists
          echo "✅ Cache cleared"
          
          # Optional: Commit the empty state
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ 2>/dev/null || true
          git commit -m "🧹 Clear Magpie cache [manual]" || echo "No changes to commit"
          git push || echo "No push needed"
      
      - name: Verify cleared
        run: |
          echo "📂 Data directory contents:"
          ls -la data/ || echo "data/ directory empty or doesn't exist"
