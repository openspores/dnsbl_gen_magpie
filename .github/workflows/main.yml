name: Generate DNSBL with Magpie

on:
  schedule:
    - cron: '0 20 * * *'  # Runs daily at 8 PM UTC
  workflow_dispatch:      # Allows manual trigger from GitHub UI

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # Increased timeout for 500 workers
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          
      - name: Install Magpie
        run: |
          go install github.com/pigeonsec/magpie/cmd/magpie@latest
          echo "✅ Magpie installed"
          
      - name: Show sources
        run: |
          echo "📋 Using sources from sources.txt:"
          cat sources.txt
          echo -e "\n📊 Total sources: $(grep -v '^#' sources.txt | grep -v '^$' | wc -l)"
          
      - name: Run Magpie (DNS validation)
        run: |
          # Create data directory for stats
          mkdir -p data
          
          # Run with MAXIMUM WORKERS for speed
          ~/go/bin/magpie \
            -source sources.txt \
            -output blocklist.txt \
            -workers 500 \
            -fetch-workers 10 \
            -dns \
            -cache \
            -data-dir ./data
          
      - name: Run stats
        run: |
          echo "📊 Aggregation Statistics:"
          ~/go/bin/magpie --stats --data-dir ./data || echo "Stats not available yet"
          
      - name: Generate summary
        run: |
          if [ -f blocklist.txt ]; then
            TOTAL=$(wc -l < blocklist.txt)
          else
            TOTAL=0
          fi
          echo "## Magpie DNSBL Update" > summary.md
          echo "" >> summary.md
          echo "- **Generated:** $(date -u)" >> summary.md
          echo "- **Total domains:** $TOTAL" >> summary.md
          echo "- **Sources:** $(grep -v '^#' sources.txt | grep -v '^$' | wc -l)" >> summary.md
          
      - name: Commit blocklist.txt to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if file exists and has changes
          if [ -f blocklist.txt ]; then
            # Add to repo
            git add blocklist.txt
            git add data/stats.json || true
            
            # Commit if there are changes
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "🤖 Auto-update blocklist [$(date +%Y-%m-%d)]"
              git push
            fi
          else
            echo "blocklist.txt not found, skipping commit"
          fi
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnsbl-output
          path: |
            blocklist.txt
            data/stats.json
            summary.md
          retention-days: 7
          if-no-files-found: warn
          
      - name: Create Release
        if: success() && hashFiles('blocklist.txt') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daily-${{ github.run_number }}
          name: "DNSBL Update #${{ github.run_number }}"
          body_path: summary.md
          files: |
            blocklist.txt
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
