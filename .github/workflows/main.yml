name: Generate DNSBL with Magpie - single instance - no validation (dedupe only)

on:
  schedule:
    - cron: '0 20 * * *'  # Runs daily at 8 PM UTC
  workflow_dispatch:      # Allows manual trigger from GitHub UI

jobs:
  aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Grants write access for commits and releases
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node.js 24
    timeout-minutes: 30    # Reduced timeout since no validation
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          
      - name: Install Magpie
        run: |
          go install github.com/pigeonsec/magpie/cmd/magpie@latest
          echo "✅ Magpie installed"
          
      - name: Show sources
        run: |
          echo "📋 Using sources from sources.txt:"
          cat sources.txt
          echo -e "\n📊 Total sources: $(grep -v '^#' sources.txt | grep -v '^$' | wc -l)"
          
      - name: Run Magpie (NO validation - dedupe only)
        run: |
          # Create data directory for stats
          mkdir -p data
          
          # Run with NO DNS VALIDATION - just fetch and dedupe
          ~/go/bin/magpie \
            -source sources.txt \
            -output blocklist.txt \
            -workers 100 \
            -fetch-workers 5 \
            -dns=false \
            -data-dir ./data
          
      - name: Generate RPZ file with full domain validation (FAST awk version)
        run: |
          echo "📝 Generating RPZ format with domain validation"
          
          # Check if blocklist.txt exists and has content
          if [ ! -f blocklist.txt ] || [ ! -s blocklist.txt ]; then
            echo "❌ blocklist.txt is empty or missing"
            exit 1
          fi
          
          # Configuration
          RPZ_FILENAME="a.rpz"
          ZONE_NAME="a"
          DNS_MAX_LENGTH=255
          ZONE_OVERHEAD=$(( ${#ZONE_NAME} + 2 ))
          MAX_DOMAIN_LENGTH=$(( DNS_MAX_LENGTH - ZONE_OVERHEAD ))
          
          echo "📋 Using filename: $RPZ_FILENAME"
          echo "📏 Max domain length for this zone: $MAX_DOMAIN_LENGTH chars"
          echo "📏 Max FQDN length: $DNS_MAX_LENGTH bytes"
          
          # Get total unique domains count
          TOTAL_DOMAINS=$(wc -l < blocklist.txt)
          CURRENT_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          # Generate serial in YYYYMMDD01 format
          SERIAL=$(date -u +"%Y%m%d01")
          
          # Create RPZ header
          {
            echo "\$TTL 300"
            echo ""
            echo "@ IN SOA router.home.arpa. admin.router.home.arpa. ("
            echo "    ${SERIAL} ; serial number in YYYYMMDD01 format"
            echo "    86400 ; Refresh (24h)"
            echo "    43200 ; Retry (12h)"
            echo "    604800 ; Expire (1 week)"
            echo "    86400 ; Negative cache TTL (24h)"
            echo ")"
            echo ""
            echo "; Name Server (NS) record"
            echo "@ IN NS router.home.arpa."
            echo ""
            echo "; Generated: ${CURRENT_DATE}"
            echo "; Total unique domains: ${TOTAL_DOMAINS}"
            echo "; Max domain length for this zone: ${MAX_DOMAIN_LENGTH} chars"
            echo "; DNS FQDN max: ${DNS_MAX_LENGTH} bytes"
            echo ""
          } > "$RPZ_FILENAME"
          
          echo "🔍 Validating domains with RFC 1035 rules (fast awk)..."
          echo ""
          
          # Record start time
          START_TIME=$(date +%s)
          
          # Use awk for ultra-fast processing
          # This single awk script does all validation in one pass
          awk -v zone="$ZONE_NAME" -v max_len="$DNS_MAX_LENGTH" -v total="$TOTAL_DOMAINS" '
          BEGIN {
            valid = 0
            rejected = 0
            zone_overhead = length(zone) + 2
            max_domain_len = max_len - zone_overhead
            
            # Progress tracking
            last_percent = 0
            bar_width = 50
          }
          
          # Skip empty lines and comments
          /^[[:space:]]*$/ { next }
          /^[#;]/ { next }
          
          {
            total_processed++
            domain = $0
            
            # Trim whitespace
            gsub(/^[[:space:]]+|[[:space:]]+$/, "", domain)
            
            # Default to valid
            valid_domain = 1
            reason = ""
            
            # Check: must have at least one dot
            if (index(domain, ".") == 0) {
              valid_domain = 0
              reason = "no_dot"
            }
            
            # Check: no spaces
            if (valid_domain && domain ~ /[[:space:]]/) {
              valid_domain = 0
              reason = "has_space"
            }
            
            # Check: total FQDN length
            if (valid_domain) {
              fqdn_len = length(domain) + 1 + length(zone) + 1
              if (fqdn_len > max_len) {
                valid_domain = 0
                reason = "fqdn_too_long:" fqdn_len ">" max_len
              }
            }
            
            # Check labels if still valid
            if (valid_domain) {
              n = split(domain, labels, ".")
              for (i = 1; i <= n; i++) {
                label = labels[i]
                
                # Skip wildcard
                if (label == "*") continue
                
                # Label length check
                if (length(label) > 63) {
                  valid_domain = 0
                  reason = "label_too_long:" length(label) ">63"
                  break
                }
                
                # Hyphen check (can't start or end with hyphen)
                if (label ~ /^-/ || label ~ /-$/) {
                  valid_domain = 0
                  reason = "label_hyphen"
                  break
                }
              }
            }
            
            # Output result
            if (valid_domain) {
              print domain > "filtered_domains.txt"
              valid++
            } else {
              print domain > "rejected_domains.txt"
              print reason > "rejected_reasons.txt"
              rejected++
            }
            
            # Progress reporting with visual bar
            if (total_processed % 5000 == 0 || total_processed == total) {
              pct = int(total_processed * 100 / total)
              
              # Create progress bar
              filled = int(pct * bar_width / 100)
              bar = ""
              for (i = 0; i < filled; i++) bar = bar "█"
              for (i = filled; i < bar_width; i++) bar = bar "░"
              
              # Print progress (without ETA since we don't have time)
              printf "\r   [%s] %3d%% | %d/%d | ✅ %d | ❌ %d", 
                     bar, pct, total_processed, total, valid, rejected
            }
          }
          
          END {
            printf "\n\n"
            print "VALID_COUNT=" valid
            print "REJECTED_COUNT=" rejected
            print "TOTAL_PROCESSED=" total_processed
          }' blocklist.txt > stats.tmp
          
          # Load stats
          source stats.tmp
          
          # Calculate elapsed time
          END_TIME=$(date +%s)
          TOTAL_TIME=$((END_TIME - START_TIME))
          
          # Count rejection reasons
          echo "📊 REJECTION REASONS SUMMARY:"
          if [ -f rejected_reasons.txt ] && [ $REJECTED_COUNT -gt 0 ]; then
            echo ""
            sort rejected_reasons.txt | uniq -c | sort -nr | while read count reason; do
              printf "   %6d x %s\n" "$count" "$reason"
            done
          else
            echo "   No domains rejected"
          fi
          
          # Append validated domains to RPZ file
          if [ -f filtered_domains.txt ] && [ $VALID_COUNT -gt 0 ]; then
            echo ""
            echo "✅ $VALID_COUNT domains passed validation"
            echo "❌ $REJECTED_COUNT domains rejected"
            
            # Add stats to RPZ header
            {
              echo "; Valid domains in RPZ: ${VALID_COUNT}"
              echo "; Rejected domains: ${REJECTED_COUNT}"
            } >> "$RPZ_FILENAME"
            
            # Append each domain with ' CNAME .'
            awk '{print $0 " CNAME ."}' filtered_domains.txt >> "$RPZ_FILENAME"
          else
            echo ""
            echo "⚠️ No valid domains found!"
            VALID_COUNT=0
          fi
          
          # Save rejected domains list for debugging
          if [ -f rejected_domains.txt ] && [ $REJECTED_COUNT -gt 0 ]; then
            echo "📝 Rejected domains saved to rejected_domains.txt"
          fi
          
          echo ""
          echo "✅ RPZ file created: $RPZ_FILENAME"
          echo "   Total entries: $VALID_COUNT"
          echo "   Rejected: $REJECTED_COUNT"
          echo "   Time taken: $(printf "%02d:%02d" $((TOTAL_TIME/60)) $((TOTAL_TIME%60)))"
          
          # Show first few lines as sample
          echo ""
          echo "📋 First 5 lines of $RPZ_FILENAME:"
          head -15 "$RPZ_FILENAME"
          
      - name: Run stats
        run: |
          echo "📊 Aggregation Statistics:"
          ~/go/bin/magpie --stats --data-dir ./data || echo "Stats not available yet"
          
      - name: Generate summary
        run: |
          if [ -f blocklist.txt ]; then
            TOTAL=$(wc -l < blocklist.txt)
            if [ -f a.rpz ]; then
              VALID=$(grep -c "CNAME" a.rpz 2>/dev/null || echo "0")
            else
              VALID=0
            fi
            REJECTED=$((TOTAL - VALID))
          else
            TOTAL=0
            VALID=0
            REJECTED=0
          fi
          echo "## Magpie DNSBL Update (No Validation)" > summary.md
          echo "" >> summary.md
          echo "- **Generated:** $(date -u)" >> summary.md
          echo "- **Total domains from sources:** $TOTAL" >> summary.md
          echo "- **Valid domains (in RPZ):** $VALID" >> summary.md
          echo "- **Rejected (RFC violations):** $REJECTED" >> summary.md
          echo "- **Sources:** $(grep -v '^#' sources.txt | grep -v '^$' | wc -l)" >> summary.md
          echo "- **RPZ file:** a.rpz (with ${VALID} entries)" >> summary.md
          echo "" >> summary.md
          echo "*Note: DNS validation disabled - domains filtered for RFC 1035 compliance only*" >> summary.md
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnsbl-output
          path: |
            blocklist.txt
            a.rpz
            rejected_domains.txt
            rejected_reasons.txt
            data/stats.json
            summary.md
          retention-days: 7
          if-no-files-found: warn
          
      - name: Create Release
        if: success() && (hashFiles('blocklist.txt') != '' || hashFiles('a.rpz') != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daily-${{ github.run_number }}
          name: "DNSBL Update #${{ github.run_number }} (No Validation)"
          body_path: summary.md
          files: |
            blocklist.txt
            a.rpz
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
