name: Generate DNSBL with Magpie (10 Runner Matrix)

on:
  workflow_dispatch:      # Allows manual trigger from GitHub UI only

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Split sources into 10 groups using simple arithmetic
  split-sources:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      group1: ${{ steps.set-groups.outputs.group1 }}
      group2: ${{ steps.set-groups.outputs.group2 }}
      group3: ${{ steps.set-groups.outputs.group3 }}
      group4: ${{ steps.set-groups.outputs.group4 }}
      group5: ${{ steps.set-groups.outputs.group5 }}
      group6: ${{ steps.set-groups.outputs.group6 }}
      group7: ${{ steps.set-groups.outputs.group7 }}
      group8: ${{ steps.set-groups.outputs.group8 }}
      group9: ${{ steps.set-groups.outputs.group9 }}
      group10: ${{ steps.set-groups.outputs.group10 }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Calculate group sizes
        id: set-groups
        run: |
          # Get clean sources (skip comments and empty lines)
          grep -v '^#' sources.txt | grep -v '^$' > clean_sources.txt
          TOTAL=$(wc -l < clean_sources.txt)
          echo "Total sources: $TOTAL"
          
          # Calculate base size and remainder for 10 groups
          GROUPS=10
          BASE_SIZE=$(( TOTAL / GROUPS ))
          REMAINDER=$(( TOTAL % GROUPS ))
          
          echo "Base size per group: $BASE_SIZE"
          echo "Remainder: $REMAINDER (first $REMAINDER groups get +1)"
          
          # Calculate start and end for each group
          START=1
          for i in $(seq 1 $GROUPS); do
            # Groups 1-REMAINDER get one extra source
            if [ $i -le $REMAINDER ]; then
              GROUP_SIZE=$(( BASE_SIZE + 1 ))
            else
              GROUP_SIZE=$BASE_SIZE
            fi
            
            END=$(( START + GROUP_SIZE - 1 ))
            
            # Store as JSON
            echo "group$i={\"group\":$i,\"start\":$START,\"end\":$END}" >> $GITHUB_OUTPUT
            echo "Group $i: lines $START-$END ($GROUP_SIZE sources)"
            
            START=$(( END + 1 ))
          done

  # Process each group with OPTIMIZED workers (50 each)
  process-group:
    needs: split-sources
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        config: 
          - ${{ fromJson(needs.split-sources.outputs.group1) }}
          - ${{ fromJson(needs.split-sources.outputs.group2) }}
          - ${{ fromJson(needs.split-sources.outputs.group3) }}
          - ${{ fromJson(needs.split-sources.outputs.group4) }}
          - ${{ fromJson(needs.split-sources.outputs.group5) }}
          - ${{ fromJson(needs.split-sources.outputs.group6) }}
          - ${{ fromJson(needs.split-sources.outputs.group7) }}
          - ${{ fromJson(needs.split-sources.outputs.group8) }}
          - ${{ fromJson(needs.split-sources.outputs.group9) }}
          - ${{ fromJson(needs.split-sources.outputs.group10) }}
      fail-fast: false
      # 10 concurrent runners - well within GitHub's 20 job limit
    
    steps:
      - name: Parse group info
        id: parse
        run: |
          echo "group_num=${{ matrix.config.group }}" >> $GITHUB_OUTPUT
          echo "start=${{ matrix.config.start }}" >> $GITHUB_OUTPUT
          echo "end=${{ matrix.config.end }}" >> $GITHUB_OUTPUT
          
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create go.sum for cache
        run: |
          # Create empty go.sum if it doesn't exist to enable caching
          if [ ! -f go.sum ]; then
            touch go.sum
            echo "Created empty go.sum for cache"
          fi
          
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          
      - name: Install Magpie
        run: |
          go install github.com/pigeonsec/magpie/cmd/magpie@latest
          echo "✅ Magpie installed"
          
      - name: Extract sources for group ${{ steps.parse.outputs.group_num }}
        run: |
          # Get clean sources (skip comments and empty lines)
          grep -v '^#' sources.txt | grep -v '^$' > clean_sources.txt
          
          START=${{ steps.parse.outputs.start }}
          END=${{ steps.parse.outputs.end }}
          
          echo "Extracting lines $START to $END for Group ${{ steps.parse.outputs.group_num }}"
          
          # Extract using sed
          sed -n "${START},${END}p" clean_sources.txt > group_${{ steps.parse.outputs.group_num }}.txt
          
          # Count and validate
          COUNT=$(wc -l < group_${{ steps.parse.outputs.group_num }}.txt)
          echo "📋 Group ${{ steps.parse.outputs.group_num }}: $COUNT sources"
          
          if [ $COUNT -eq 0 ]; then
            echo "⚠️ Warning: Group ${{ steps.parse.outputs.group_num }} has no sources"
          else
            echo "Sources in group ${{ steps.parse.outputs.group_num }}:"
            cat group_${{ steps.parse.outputs.group_num }}.txt
          fi
          
      - name: Show runner IP and info
        run: |
          echo "🌐 Runner ${{ steps.parse.outputs.group_num }} Information:"
          # Get IP with fallback if service is unavailable
          IP=$(curl -s --connect-timeout 5 https://api.ipify.org || echo "unavailable")
          echo "   Public IP: $IP"
          echo "   Hostname: $(hostname)"
          echo "   Worker count: 50"
          echo "   Fetcher count: 5"
          echo "   Sources in group: $(wc -l < group_${{ steps.parse.outputs.group_num }}.txt)"
          
      - name: Clean up previous stats
        run: |
          # Remove any existing stats to prevent conflicts
          rm -rf ./data
          mkdir -p ./data
          echo "🧹 Stats directory cleaned"
          
      - name: Run Magpie for group ${{ steps.parse.outputs.group_num }}
        run: |
          # Check if group file has content
          if [ ! -s group_${{ steps.parse.outputs.group_num }}.txt ]; then
            echo "⚠️ Group ${{ steps.parse.outputs.group_num }} has no sources, creating empty output"
            touch blocklist_part_${{ steps.parse.outputs.group_num }}.txt
          else
            # Run with REDUCED WORKERS (50) to avoid rate limiting
            ~/go/bin/magpie \
              -source group_${{ steps.parse.outputs.group_num }}.txt \
              -output blocklist_part_${{ steps.parse.outputs.group_num }}.txt \
              -workers 50 \
              -fetch-workers 5 \
              -dns \
              -cache \
              -data-dir ./data
          fi
          
          echo "✅ Group ${{ steps.parse.outputs.group_num }} complete: $(wc -l < blocklist_part_${{ steps.parse.outputs.group_num }}.txt) domains"
          
      - name: Upload part artifact
        uses: actions/upload-artifact@v4
        with:
          name: blocklist-part-${{ steps.parse.outputs.group_num }}
          path: |
            blocklist_part_${{ steps.parse.outputs.group_num }}.txt
          retention-days: 1
          if-no-files-found: warn

  # Combine all parts into final blocklist
  combine:
    needs: process-group
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Go for stats
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          
      - name: Install Magpie for stats
        run: |
          go install github.com/pigeonsec/magpie/cmd/magpie@latest
          echo "✅ Magpie installed for stats"
          
      - name: Download all parts
        uses: actions/download-artifact@v4
        with:
          path: ./parts
          pattern: blocklist-part-*
          merge-multiple: true
          
      - name: Combine and deduplicate
        run: |
          echo "📦 Combining all blocklist parts..."
          
          # Show sizes before dedup
          TOTAL_RAW=0
          for i in {1..10}; do
            if [ -f "./parts/blocklist_part_${i}.txt" ]; then
              COUNT=$(wc -l < "./parts/blocklist_part_${i}.txt")
              echo "  Part $i: $COUNT domains"
              TOTAL_RAW=$((TOTAL_RAW + COUNT))
            else
              echo "  Part $i: 0 domains (missing)"
            fi
          done
          
          # Combine all parts
          cat ./parts/blocklist_part_*.txt > combined.txt 2>/dev/null || true
          echo "Raw combined: $TOTAL_RAW domains"
          
          # CRITICAL: Global deduplication
          sort -u combined.txt > blocklist.txt 2>/dev/null || touch blocklist.txt
          TOTAL_UNIQUE=$(wc -l < blocklist.txt)
          DUPLICATES=$((TOTAL_RAW - TOTAL_UNIQUE))
          
          echo "✅ Final unique domains: $TOTAL_UNIQUE"
          echo "   Removed $DUPLICATES cross-group duplicates"
          
      - name: Generate RPZ file
        run: |
          echo "📝 Generating RPZ format a.rpz from blocklist.txt"
          
          if [ ! -f blocklist.txt ] || [ ! -s blocklist.txt ]; then
            echo "⚠️ blocklist.txt is empty, creating minimal RPZ"
            TOTAL_DOMAINS=0
          else
            TOTAL_DOMAINS=$(wc -l < blocklist.txt)
          fi
          
          CURRENT_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          SERIAL=$(date -u +"%Y%m%d01")
          
          # Create RPZ header
          echo "\$TTL 300" > a.rpz
          echo "" >> a.rpz
          echo "@ IN SOA router.home.arpa. admin.router.home.arpa. (" >> a.rpz
          echo "    ${SERIAL} ; serial number in YYYYMMDD01 format" >> a.rpz
          echo "    86400 ; Refresh (24h)" >> a.rpz
          echo "    43200 ; Retry (12h)" >> a.rpz
          echo "    604800 ; Expire (1 week)" >> a.rpz
          echo "    86400 ; Negative cache TTL (24h)" >> a.rpz
          echo ")" >> a.rpz
          echo "" >> a.rpz
          echo "; Name Server (NS) record" >> a.rpz
          echo "@ IN NS router.home.arpa." >> a.rpz
          echo "" >> a.rpz
          echo "; Generated: ${CURRENT_DATE}" >> a.rpz
          echo "; Total unique domains: ${TOTAL_DOMAINS}" >> a.rpz
          echo "" >> a.rpz
          
          # Append each domain with ' CNAME .' if file has content
          if [ -s blocklist.txt ]; then
            awk '{print $0 " CNAME ."}' blocklist.txt >> a.rpz
          fi
          
          echo "✅ RPZ file created: a.rpz (${TOTAL_DOMAINS} entries)"
          echo "📋 First 5 lines of a.rpz:"
          head -15 a.rpz
          
      - name: Generate stats (from runner 1 only)
        run: |
          echo "📊 Aggregation Statistics (from Runner 1 - partial):"
          # Create empty data dir if needed
          mkdir -p data
          # Note: Stats are partial - only showing Runner 1's data
          echo "Stats are partial (only Runner 1 shown) due to parallel execution" > data/stats_note.txt
          
      - name: Generate summary
        run: |
          TOTAL=$(wc -l < blocklist.txt 2>/dev/null || echo "0")
          echo "## Magpie DNSBL Update" > summary.md
          echo "" >> summary.md
          echo "- **Generated:** $(date -u)" >> summary.md
          echo "- **Total unique domains:** $TOTAL" >> summary.md
          echo "- **Sources:** $(grep -v '^#' sources.txt | grep -v '^$' | wc -l)" >> summary.md
          echo "- **RPZ file:** a.rpz (with ${TOTAL} entries)" >> summary.md
          echo "" >> summary.md
          echo "*Processed with 10 parallel runners (50 workers, 5 fetchers each)*" >> summary.md
          
      - name: Commit files to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if files exist and have changes
          FILES_TO_ADD=""
          for file in blocklist.txt a.rpz summary.md; do
            if [ -f "$file" ]; then
              FILES_TO_ADD="$FILES_TO_ADD $file"
            fi
          done
          
          if [ -n "$FILES_TO_ADD" ]; then
            git add $FILES_TO_ADD
            
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "🤖 Auto-update blocklists [$(date +%Y-%m-%d)] (10-runner matrix)"
              git push
            fi
          else
            echo "No files to commit, skipping commit"
          fi
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnsbl-output
          path: |
            blocklist.txt
            a.rpz
            summary.md
          retention-days: 7
          if-no-files-found: warn
          
      - name: Create Release
        if: success() && (hashFiles('blocklist.txt') != '' || hashFiles('a.rpz') != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daily-${{ github.run_number }}
          name: "DNSBL Update #${{ github.run_number }}"
          body_path: summary.md
          files: |
            blocklist.txt
            a.rpz
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
