name: Generate Blocklist

on:
  workflow_dispatch:
    inputs:
      dns_validation:
        description: 'Enable DNS validation'
        type: boolean
        default: false
        required: false
      http_validation:
        description: 'Enable HTTP validation (in addition to DNS)'
        type: boolean
        default: false
        required: false
      workers:
        description: 'Number of validation workers'
        type: number
        default: 100
        required: false
      fetch_workers:
        description: 'Number of URL fetchers'
        type: number
        default: 5
        required: false
      quiet_mode:
        description: 'Quiet mode - minimal output'
        type: boolean
        default: true
        required: false
      release_version:
        description: 'Release version (e.g., v1.0.0 or leave empty for auto)'
        type: string
        default: ''
        required: false
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false
        required: false

jobs:
  generate-blocklist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install Magpie
        run: |
          go install github.com/pigeonsec/magpie/cmd/magpie@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Verify sources.txt exists
        run: |
          if [ ! -f "sources.txt" ]; then
            echo "❌ Error: sources.txt not found in repository root"
            echo ""
            echo "Please create a sources.txt file with one blocklist URL per line:"
            echo ""
            echo "Example:"
            echo "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
            echo "https://v.firebog.net/hosts/static/w3kbl.txt"
            echo "https://raw.githubusercontent.com/PolishFiltersTeam/KADhosts/master/KADhosts.txt"
            exit 1
          fi
          
          SOURCE_COUNT=$(grep -v '^#' sources.txt | grep -v '^$' | wc -l)
          echo "✅ Found sources.txt with $SOURCE_COUNT sources"
          echo "source_count=$SOURCE_COUNT" >> $GITHUB_OUTPUT

      - name: Display sources
        run: |
          echo "📋 Sources to process:"
          echo "---------------------"
          grep -v '^#' sources.txt | grep -v '^$' | cat -n
          echo "---------------------"

      - name: Run Magpie
        id: magpie
        run: |
          # Build command based on inputs
          CMD="magpie -s sources.txt -o blocklist.txt"
          
          # DNS validation (default false per user request)
          if [ "${{ github.event.inputs.dns_validation }}" == "true" ]; then
            CMD="$CMD -dns=true"
          else
            CMD="$CMD -dns=false"
          fi
          
          # HTTP validation
          if [ "${{ github.event.inputs.http_validation }}" == "true" ]; then
            CMD="$CMD -http=true"
          fi
          
          # Workers and fetchers
          CMD="$CMD -workers ${{ github.event.inputs.workers }}"
          CMD="$CMD -fetch-workers ${{ github.event.inputs.fetch_workers }}"
          
          # Quiet mode
          if [ "${{ github.event.inputs.quiet_mode }}" == "true" ]; then
            CMD="$CMD -quiet"
          fi
          
          echo "🚀 Running: $CMD"
          echo "---------------------"
          
          # Create data directory for stats
          mkdir -p data
          
          # Execute and capture output
          eval $CMD 2>&1 | tee magpie_output.log
          
          # Check if blocklist was created
          if [ -f "blocklist.txt" ]; then
            DOMAIN_COUNT=$(wc -l < blocklist.txt)
            FILE_SIZE=$(du -h blocklist.txt | cut -f1)
            echo "✅ Blocklist generated successfully with $DOMAIN_COUNT domains"
            echo "domain_count=$DOMAIN_COUNT" >> $GITHUB_OUTPUT
            echo "file_size=$FILE_SIZE" >> $GITHUB_OUTPUT
          else
            echo "❌ Failed to generate blocklist.txt"
            exit 1
          fi

      - name: Show blocklist stats
        run: |
          if [ -f "blocklist.txt" ]; then
            echo "📊 Blocklist Statistics:"
            echo "---------------------"
            echo "Total domains: $(wc -l < blocklist.txt)"
            echo "File size: $(du -h blocklist.txt | cut -f1)"
            echo ""
            echo "First 10 entries (sample):"
            head -10 blocklist.txt | sed 's/^/  /'
            echo ""
            echo "Last 10 entries (sample):"
            tail -10 blocklist.txt | sed 's/^/  /'
          fi

      - name: Show Magpie stats (if available)
        run: |
          if [ -f "data/stats.json" ]; then
            echo "📈 Magpie Statistics:"
            echo "---------------------"
            ./magpie --stats --data-dir ./data || echo "Stats display failed"
          fi

      - name: Create release tag
        id: tag
        run: |
          # Generate version if not provided
          if [ -z "${{ github.event.inputs.release_version }}" ]; then
            DATE_TAG="blocklist-$(date +%Y%m%d-%H%M%S)"
            echo "version=$DATE_TAG" >> $GITHUB_OUTPUT
            echo "release_name=Blocklist $DATE_TAG" >> $GITHUB_OUTPUT
          else
            VERSION="${{ github.event.inputs.release_version }}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "release_name=Blocklist $VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create release notes
        id: release_notes
        run: |
          VALIDATION_MODE="No validation"
          if [ "${{ github.event.inputs.dns_validation }}" == "true" ] && [ "${{ github.event.inputs.http_validation }}" == "true" ]; then
            VALIDATION_MODE="DNS + HTTP"
          elif [ "${{ github.event.inputs.dns_validation }}" == "true" ]; then
            VALIDATION_MODE="DNS only"
          elif [ "${{ github.event.inputs.http_validation }}" == "true" ]; then
            VALIDATION_MODE="HTTP only"
          fi
          
          cat > release_notes.md << EOF
          ## 📋 Blocklist Release
          
          ### 📊 Summary
          - **Domains:** ${{ steps.magpie.outputs.domain_count }}
          - **File Size:** ${{ steps.magpie.outputs.file_size }}
          - **Sources:** ${{ steps.verify.outputs.source_count }}
          - **Validation:** $VALIDATION_MODE
          - **Workers:** ${{ github.event.inputs.workers }}
          - **Fetchers:** ${{ github.event.inputs.fetch_workers }}
          
          ### 📅 Generated
          $(date -u "+%Y-%m-%d %H:%M:%S UTC")
          
          ### 🔗 Sources Processed
          $(grep -v '^#' sources.txt | grep -v '^$' | sed 's/^/- /')
          
          ### 📈 Validation Statistics
          $(if [ -f "data/stats.json" ]; then
            echo "\`\`\`json"
            cat data/stats.json | jq '.' 2>/dev/null || cat data/stats.json
            echo "\`\`\`"
          else
            echo "*No statistics available*"
          fi)
          
          ### ⚡ Performance
          - **Workflow Run:** \${{ github.run_id }}
          - **Triggered by:** @\${{ github.actor }}
          
          ---
          *Generated by Magpie blocklist aggregator*
          EOF

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: ${{ steps.tag.outputs.release_name }}
          body_path: release_notes.md
          prerelease: ${{ github.event.inputs.prerelease }}
          files: |
            blocklist.txt
            data/stats.json
            magpie_output.log
          generate_release_notes: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload additional artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: blocklist-backup-${{ steps.tag.outputs.version }}
          path: |
            blocklist.txt
            data/stats.json
            magpie_output.log
            sources.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Summary
        run: |
          echo "## ✅ Blocklist Generation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Domains** | ${{ steps.magpie.outputs.domain_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **File Size** | ${{ steps.magpie.outputs.file_size }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Sources** | ${{ steps.verify.outputs.source_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **DNS Validation** | ${{ github.event.inputs.dns_validation }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **HTTP Validation** | ${{ github.event.inputs.http_validation }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Workers** | ${{ github.event.inputs.workers }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Fetchers** | ${{ github.event.inputs.fetch_workers }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Release Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** [${{ steps.tag.outputs.release_name }}](${{ steps.create_release.outputs.url }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Download blocklist:** [blocklist.txt](${{ steps.create_release.outputs.upload_url }}/assets/blocklist.txt)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "🔁 **Artifacts backup** also available in workflow run" >> $GITHUB_STEP_SUMMARY
